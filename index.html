<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-shell" aria-labelledby="page-title">
        <header class="hero">
          <img class="brand-logo" src="./assets/logo@4x.png" alt="Brand logo" />
          <h1 id="page-title">Welcome Back</h1>
          <p>Log in to continue hiving</p>
        </header>

        <form class="login-card app-form" data-action="login" novalidate>
          <div class="field" data-field data-empty="Please enter your school email address." data-invalid="Use a valid school email ending in .edu.">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="Enter your school .edu email" aria-describedby="email-error" required />
            <p class="field-error" id="email-error" aria-live="polite"></p>
          </div>

          <div class="field password-field" data-field data-empty="Please enter your password.">
            <label for="password">Password</label>
            <div class="password-input">
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password" aria-describedby="password-error" required />
              <button class="visibility-toggle" type="button" aria-label="Show password" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.2 12s3.3-5.8 9.8-5.8S21.8 12 21.8 12 18.5 17.8 12 17.8 2.2 12 2.2 12Z"/><circle cx="12" cy="12" r="2.8"/></svg>
              </button>
            </div>
            <p class="field-error" id="password-error" aria-live="polite"></p>
          </div>

          <a class="forgot-link" href="#forgot-password">Forget Password?</a>
          <button class="login-button" type="submit">Log In</button>
          <p class="form-message" id="form-message" role="status"></p>
        </form>

        <p class="signup-copy">Don’t have an account? <a href="./sign-up.html">Sign Up</a></p>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
