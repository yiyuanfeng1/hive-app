<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-shell" aria-labelledby="page-title">
        <header class="hero verify-hero">
          <img class="brand-logo" src="./assets/logo@4x.png" alt="Brand logo" />
          <h1 id="page-title">Verify Your Email</h1>
          <p>Enter the code send to your email</p>
        </header>

        <form class="login-card compact-card app-form" data-action="verify" novalidate>
          <div class="field code-field" data-field data-empty="Please enter the verification code." data-invalid="Enter the verification code sent to your email.">
            <input id="verification-code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="Enter Code" aria-label="Verification code" aria-describedby="code-error" required />
            <p class="field-error" id="code-error" aria-live="polite"></p>
          </div>
          <button class="login-button" type="submit">Verify Code</button>
          <p class="form-message" role="status"></p>
          <p class="resend-copy">Not seeing the code? <button type="button" class="text-button" data-resend>Try Again</button></p>
        </form>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
